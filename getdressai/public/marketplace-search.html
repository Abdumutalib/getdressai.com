<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace search — GetdressAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: Inter, system-ui, sans-serif; background: #fafafa; }</style>
  <script src="/locales.js"></script>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-3xl mx-auto">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-4">
      <p class="text-sm text-neutral-500">
        <a href="/" id="marketplace-back-link" class="text-blue-600 hover:underline">← Back to GetdressAI</a>
      </p>
      <div id="marketplace-lang-select" class="flex justify-start sm:justify-end"></div>
    </div>

    <div class="marketplace-search bg-white rounded-2xl border border-neutral-200 p-6 shadow-sm">
      <h3 class="text-lg font-semibold mb-4">🛍️ Find Clothes That Fit You Perfectly</h3>

      <div class="grid md:grid-cols-3 gap-4 mb-6">
        <div>
          <label class="text-sm font-medium text-neutral-800" for="search-size">Your Size</label>
          <select id="search-size" class="w-full border border-neutral-200 rounded-xl px-4 py-2 mt-1 bg-white">
            <option value="">Auto (from your profile)</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
          </select>
        </div>

        <div>
          <label class="text-sm font-medium text-neutral-800" for="search-style">Style / search</label>
          <input id="search-style" type="text" placeholder="e.g. Casual dress, streetwear"
                 class="w-full border border-neutral-200 rounded-xl px-4 py-2 mt-1">
        </div>

        <div>
          <label class="text-sm font-medium text-neutral-800" for="search-budget">Max budget ($)</label>
          <input id="search-budget" type="number" min="0" step="1" placeholder="e.g. 150"
                 class="w-full border border-neutral-200 rounded-xl px-4 py-2 mt-1">
        </div>
      </div>

      <div class="flex flex-wrap gap-4 mb-6">
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" id="marketplace-amazon" checked class="rounded border-neutral-300"> Amazon
        </label>
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" id="marketplace-ebay" checked class="rounded border-neutral-300"> eBay
        </label>
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" id="marketplace-aliexpress" class="rounded border-neutral-300"> AliExpress
        </label>
      </div>

      <button type="button" id="search-btn"
              class="w-full bg-neutral-900 text-white py-3 rounded-xl font-medium hover:bg-neutral-800 transition">
        🔍 Find matching products
      </button>

      <div id="marketplace-results" class="mt-8 space-y-4" aria-live="polite"></div>
    </div>
  </div>

  <script>
    const MARKETPLACE_TRANSLATIONS = (window.GETDRESSAI_LOCALES && window.GETDRESSAI_LOCALES.TRANSLATIONS) || {};
    const MARKETPLACE_LANG_OPTIONS = (window.GETDRESSAI_LOCALES && window.GETDRESSAI_LOCALES.LANG_OPTIONS) || [{ id: "en", label: "English" }];
    let marketplaceLang = localStorage.getItem("getdressai_lang") || "uz";
    if (!MARKETPLACE_TRANSLATIONS[marketplaceLang]) marketplaceLang = "en";

    function t(key, fallback) {
      const pack = MARKETPLACE_TRANSLATIONS[marketplaceLang] || MARKETPLACE_TRANSLATIONS.en || {};
      const fb = MARKETPLACE_TRANSLATIONS.en || {};
      return pack[key] || fb[key] || fallback || key;
    }

    function marketplaceBackText() {
      if (marketplaceLang === "ru") return "← Назад в GetDressAI";
      if (marketplaceLang === "uz") return "← GetDressAI ga qaytish";
      if (marketplaceLang === "de") return "← Zurück zu GetDressAI";
      if (marketplaceLang === "fr") return "← Retour à GetDressAI";
      if (marketplaceLang === "es") return "← Volver a GetDressAI";
      if (marketplaceLang === "pt") return "← Voltar ao GetDressAI";
      if (marketplaceLang === "ar") return "← العودة إلى GetDressAI";
      return "← Back to GetDressAI";
    }

    function renderLanguageSelector() {
      const el = document.getElementById("marketplace-lang-select");
      if (!el) return;
      const options = MARKETPLACE_LANG_OPTIONS.map(
        (o) => `<option value="${o.id}" ${marketplaceLang === o.id ? "selected" : ""}>${o.label}</option>`
      ).join("");
      el.innerHTML = `<label class="flex items-center gap-2 text-sm"><span class="text-neutral-500 whitespace-nowrap">${t("langLabel", "Language")}</span><select id="marketplace-lang" class="border rounded-lg px-2 py-1.5 bg-white">${options}</select></label>`;
      el.querySelector("select")?.addEventListener("change", (e) => {
        marketplaceLang = e.target.value;
        localStorage.setItem("getdressai_lang", marketplaceLang);
        applyMarketplaceLanguageChrome();
      });
    }

    function applyMarketplaceLanguageChrome() {
      document.documentElement.lang = marketplaceLang;
      const backLink = document.getElementById("marketplace-back-link");
      if (backLink) backLink.textContent = marketplaceBackText();
      renderLanguageSelector();
    }

    function escapeHtml(s) {
      if (s == null) return "";
      const div = document.createElement("div");
      div.textContent = String(s);
      return div.innerHTML;
    }

    function safeImgUrl(url) {
      const u = String(url || "").trim();
      if (!u) return "";
      try {
        const parsed = new URL(u, window.location.origin);
        if (parsed.protocol === "http:" || parsed.protocol === "https:") return parsed.href;
      } catch (_) {}
      return "";
    }

    async function searchAllMarketplaces() {
      const size = document.getElementById("search-size").value.trim();
      const style = document.getElementById("search-style").value.trim();
      const budgetRaw = document.getElementById("search-budget").value.trim();
      const budgetNum = budgetRaw === "" ? NaN : parseInt(budgetRaw, 10);

      const sources = [];
      if (document.getElementById("marketplace-amazon").checked) sources.push("amazon");
      if (document.getElementById("marketplace-ebay").checked) sources.push("ebay");
      if (document.getElementById("marketplace-aliexpress").checked) sources.push("aliexpress");

      const resultsDiv = document.getElementById("marketplace-results");

      if (!style) {
        resultsDiv.innerHTML =
          '<div class="text-center text-amber-700 py-4 text-sm">Enter a style or search phrase (e.g. “summer dress”).</div>';
        return;
      }
      if (!sources.length) {
        resultsDiv.innerHTML =
          '<div class="text-center text-amber-700 py-4 text-sm">Select at least one marketplace.</div>';
        return;
      }

      const payload = {
        keywords: style,
        style,
        sources,
      };
      if (size) payload.size = size;
      if (Number.isFinite(budgetNum) && budgetNum >= 0) {
        payload.budget = { max: budgetNum };
      }

      resultsDiv.innerHTML =
        '<div class="text-center py-8">' +
        '<div class="animate-spin rounded-full h-10 w-10 border-2 border-neutral-200 border-t-neutral-900 mx-auto"></div>' +
        '<p class="mt-4 text-sm text-neutral-600">Searching across marketplaces…</p>' +
        "</div>";

      try {
        const response = await fetch("/api/hybrid-marketplace-search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok || data.success === false) {
          const msg = data.error || data.message || "Request failed (" + response.status + ")";
          resultsDiv.innerHTML =
            '<div class="text-center text-red-600 py-8 text-sm">' + escapeHtml(msg) + "</div>";
          return;
        }

        const errs = data.marketplaceErrors;
        const errBanner =
          errs && errs.length
            ? '<div class="bg-amber-50 border border-amber-200 text-amber-900 rounded-xl p-3 text-sm mb-4">' +
              "<strong>Partial results:</strong> " +
              errs.map((e) => escapeHtml(e.marketplace + ": " + e.error)).join(" · ") +
              "</div>"
            : "";

        const products = Array.isArray(data.products) ? data.products : [];
        const total = data.totalCount != null ? data.totalCount : products.length;

        const cards = products
          .map((p) => {
            const img = safeImgUrl(p.image);
            const badge =
              p.marketplace === "amazon"
                ? "bg-orange-100 text-orange-800"
                : p.marketplace === "ebay"
                  ? "bg-blue-100 text-blue-800"
                  : "bg-red-100 text-red-800";
            const score = Math.round(Number(p.totalFitScore) || 0);
            const price =
              p.price != null && p.price !== "" && Number.isFinite(Number(p.price))
                ? Number(p.price).toFixed(2)
                : "—";
            const href = String(p.affiliateUrl || "#").trim();
            const link =
              href && href !== "#"
                ? '<a href="' +
                  escapeHtml(href) +
                  '" target="_blank" rel="noopener noreferrer" class="text-sm text-blue-600 hover:underline">Shop now →</a>'
                : '<span class="text-sm text-neutral-400">No link</span>';

            return (
              '<div class="bg-white rounded-2xl border border-neutral-200 p-4 flex gap-4 hover:shadow-md transition">' +
              (img
                ? '<img src="' +
                  escapeHtml(img) +
                  '" alt="" class="w-24 h-24 object-cover rounded-xl shrink-0 bg-neutral-100" loading="lazy" width="96" height="96">'
                : '<div class="w-24 h-24 rounded-xl bg-neutral-100 shrink-0 flex items-center justify-center text-xs text-neutral-400">No image</div>') +
              '<div class="flex-1 min-w-0">' +
              '<div class="flex justify-between gap-2">' +
              '<div class="min-w-0">' +
              '<span class="text-xs px-2 py-0.5 rounded-full ' +
              badge +
              '">' +
              escapeHtml(p.marketplace || "?") +
              "</span>" +
              '<h3 class="font-semibold mt-1 text-neutral-900 break-words">' +
              escapeHtml(p.title || "Untitled") +
              "</h3>" +
              "</div>" +
              '<div class="text-right shrink-0">' +
              '<p class="text-xl font-bold text-neutral-900">$' +
              escapeHtml(price) +
              "</p>" +
              '<div class="flex items-center gap-1 mt-1 justify-end">' +
              '<div class="w-20 h-1.5 bg-neutral-200 rounded-full overflow-hidden">' +
              '<div class="h-full bg-green-500 rounded-full" style="width:' +
              score +
              '%"></div>' +
              "</div>" +
              '<span class="text-xs text-neutral-500">' +
              score +
              "% fit</span>" +
              "</div>" +
              "</div>" +
              "</div>" +
              '<div class="mt-2 flex flex-wrap gap-2">' +
              (p.rating != null && p.rating !== ""
                ? '<span class="text-xs bg-neutral-100 px-2 py-0.5 rounded">⭐ ' +
                  escapeHtml(String(p.rating)) +
                  "</span>"
                : "") +
              (p.saleCount != null
                ? '<span class="text-xs bg-neutral-100 px-2 py-0.5 rounded">Sales: ' +
                  escapeHtml(String(p.saleCount)) +
                  "</span>"
                : "") +
              "</div>" +
              '<div class="mt-3">' +
              link +
              "</div>" +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        resultsDiv.innerHTML =
          errBanner +
          '<div class="bg-neutral-50 rounded-xl p-3 text-sm mb-4 text-neutral-700">' +
          "Found <strong>" +
          escapeHtml(String(total)) +
          "</strong> matching products · Fit score uses your size, style &amp; budget" +
          "</div>" +
          (cards || '<p class="text-center text-neutral-500 py-6">No products returned. Check API keys in <code class="text-xs bg-neutral-100 px-1 rounded">.env</code>.</p>');
      } catch (err) {
        resultsDiv.innerHTML =
          '<div class="text-center text-red-600 py-8 text-sm">' +
          escapeHtml(err && err.message ? err.message : String(err)) +
          "</div>";
      }
    }

    applyMarketplaceLanguageChrome();
    document.getElementById("search-btn").addEventListener("click", searchAllMarketplaces);
  </script>
</body>
</html>
