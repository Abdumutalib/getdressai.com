<!-- Фойдаланувчи профили формаси -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DressAI — Кийим тавсияси</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/locales.js"></script>
</head>
<div style="display:flex;justify-content:flex-end;padding:16px 16px 0;">
  <div id="recommend-lang-select"></div>
</div>
<div class="user-profile-form">
  <h2>Ўз профилингизни киритинг</h2>
  
  <label>Ёш:</label>
  <input type="number" id="age" placeholder="25">
  
  <label>Жинс:</label>
  <select id="gender">
    <option value="female">Аёл</option>
    <option value="male">Эркак</option>
  </select>
  
  <label>Бўй (см):</label>
  <input type="number" id="height" placeholder="165">
  
  <label>Вазн (кг):</label>
  <input type="number" id="weight" placeholder="60">
  
  <label>Услуб:</label>
  <select id="style">
    <option value="casual">Casual</option>
    <option value="elegant">Elegant</option>
    <option value="sport">Sport</option>
    <option value="business">Business</option>
  </select>
  
  <label>Фасл:</label>
  <select id="season">
    <option value="summer">Ёз</option>
    <option value="winter">Қиш</option>
    <option value="spring">Баҳор</option>
    <option value="autumn">Куз</option>
  </select>
  
  <label>Нарх ($):</label>
  <input type="number" id="minPrice" placeholder="10"> - 
  <input type="number" id="maxPrice" placeholder="200">
  
  <label>Афзал ранглар:</label>
  <input type="text" id="colors" placeholder="қора, оқ, кўк">
  
  <button onclick="getRecommendations()">Тавсия олиш</button>
</div>

<div id="recommendations"></div>

<script>
const RECOMMEND_TRANSLATIONS = (window.GETDRESSAI_LOCALES && window.GETDRESSAI_LOCALES.TRANSLATIONS) || {};
const RECOMMEND_LANG_OPTIONS = (window.GETDRESSAI_LOCALES && window.GETDRESSAI_LOCALES.LANG_OPTIONS) || [{ id: "en", label: "English" }];
let recommendLang = localStorage.getItem("getdressai_lang") || "uz";
if (!RECOMMEND_TRANSLATIONS[recommendLang]) recommendLang = "en";

function recommendT(key, fallback) {
  const pack = RECOMMEND_TRANSLATIONS[recommendLang] || RECOMMEND_TRANSLATIONS.en || {};
  const fb = RECOMMEND_TRANSLATIONS.en || {};
  return pack[key] || fb[key] || fallback || key;
}

function renderRecommendLanguageSelector() {
  const el = document.getElementById("recommend-lang-select");
  if (!el) return;
  const options = RECOMMEND_LANG_OPTIONS.map(
    (o) => `<option value="${o.id}" ${recommendLang === o.id ? "selected" : ""}>${o.label}</option>`
  ).join("");
  el.innerHTML = `<label style="display:flex;align-items:center;gap:8px;font-size:14px;"><span style="color:#666;">${recommendT("langLabel", "Language")}</span><select id="recommend-lang" style="padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;">${options}</select></label>`;
  el.querySelector("select")?.addEventListener("change", (e) => {
    recommendLang = e.target.value;
    localStorage.setItem("getdressai_lang", recommendLang);
    document.documentElement.lang = recommendLang;
    renderRecommendLanguageSelector();
  });
}

document.documentElement.lang = recommendLang;
renderRecommendLanguageSelector();

async function getRecommendations() {
  const userData = {
    age: document.getElementById('age').value,
    gender: document.getElementById('gender').value,
    height: document.getElementById('height').value,
    weight: document.getElementById('weight').value,
    style: document.getElementById('style').value,
    season: document.getElementById('season').value,
    minPrice: document.getElementById('minPrice').value,
    maxPrice: document.getElementById('maxPrice').value,
    preferredColors: document.getElementById('colors').value.split(','),
    generateImage: true
  };
  
  const response = await fetch('/api/recommend', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userData, critical: false, marketplace: 'all' })
  });
  
  const data = await response.json();
  
  document.getElementById('recommendations').innerHTML = `
    <h3>Сизга tavsiya etiladigan ўлчам: ${data.userProfile.recommendedSize}</h3>
    <p>${data.aiRecommendations}</p>
    <h3>Маҳсулотлар:</h3>
    <div class="products-grid">
      ${data.products.map(p => `
        <div class="product">
          <img src="${p.image}" alt="${p.title}">
          <h4>${p.title}</h4>
          <p>$${p.price}</p>
          <p>${p.source}</p>
          <a href="${p.url}" target="_blank">Харид қилиш →</a>
        </div>
      `).join('')}
    </div>
    ${data.generatedImage ? `<img src="${data.generatedImage}" alt="AI generated outfit">` : ''}
  `;
}
</script>
